name: build

# Compiles all SBF programs on Linux (a compile-regression gate). The full runtime
# `anchor test` suite is NOT run here: it needs stable program IDs (declare_id! == the
# deployed address), which conventionally means committing the program keypairs — declined
# for security. See docs/audit/TEST-STATUS.md for the full rationale.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SOLANA_VERSION: v3.1.14
  ANCHOR_VERSION: "0.31.1"
  # Platform-tools shipping Rust >= 1.85 (edition2024). Anchor 0.31.1's default SBF
  # toolchain is rust 1.79 and cannot parse edition2024 deps (crypto-common, blake3, ...).
  TOOLS_VERSION: v1.52

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Cache Cargo + build artifacts + AVM + platform-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.avm/
            ~/.cache/solana/
            target/
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-

      - name: Cache Solana tool suite
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo build-sbf --version || true

      - name: Install Anchor via AVM
        run: |
          if ! command -v avm >/dev/null 2>&1; then
            cargo install --git https://github.com/coral-xyz/anchor avm --force
          fi
          # Build from source: avm >=1.1 rejects the prebuilt 0.31.1 binary for
          # failing build-provenance attestation verification.
          avm install "${ANCHOR_VERSION}" --from-source
          avm use "${ANCHOR_VERSION}"
          anchor --version

      - name: Pre-fetch platform-tools ${{ env.TOOLS_VERSION }} (Rust >= 1.85)
        run: |
          set -euo pipefail
          dest="$HOME/.cache/solana/${TOOLS_VERSION}/platform-tools"
          if [ ! -x "$dest/rust/bin/rustc" ]; then
            mkdir -p "$dest"
            url="https://github.com/anza-xyz/platform-tools/releases/download/${TOOLS_VERSION}/platform-tools-linux-x86_64.tar.bz2"
            curl -sSfL "$url" -o /tmp/pt.tar.bz2
            # tarball has rust/, llvm/, ... at its root -> extract INTO platform-tools/
            tar -xjf /tmp/pt.tar.bz2 -C "$dest"
          fi
          "$dest/rust/bin/rustc" --version

      # --no-idl skips Anchor 0.31.1's rust-1.79 IDL toolchain (incompatible with the
      # edition2024 deps). The SBF compile itself uses platform-tools v1.52 (rust 1.89).
      - name: Build all programs (SBF, Rust 1.89)
        run: anchor build --no-idl -- --tools-version ${TOOLS_VERSION}
