name: anchor-test

# Runs the full Anchor test suite on Linux, where solana-test-validator is
# reliable (the local Windows validator wedges — see docs/audit/TEST-STATUS.md).
# Confirms the 2026-07-21 security fixes + regression tests green.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SOLANA_VERSION: v3.1.14   # match the version the repo builds with locally
  ANCHOR_VERSION: "0.31.1"
  # Platform-tools that ships Rust >= 1.85 (edition2024). The default SBF toolchain
  # for this Solana release is older (rust 1.79) and cannot parse edition2024 deps
  # (crypto-common, toml_edit) that the dependency tree pulls in. v1.52 = rust 1.89,
  # matching the local build.
  TOOLS_VERSION: v1.52

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Cache Cargo + build artifacts + AVM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.avm/
            target/
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-

      - name: Cache Solana tool suite
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo build-sbf --version || true

      - name: Install Anchor via AVM
        run: |
          if ! command -v avm >/dev/null 2>&1; then
            cargo install --git https://github.com/coral-xyz/anchor avm --force
          fi
          # Build from source: avm >=1.1 rejects the prebuilt 0.31.1 binary for
          # failing build-provenance attestation verification.
          avm install "${ANCHOR_VERSION}" --from-source
          avm use "${ANCHOR_VERSION}"
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Yarn (corepack)
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install

      - name: Generate a CI wallet
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json

      - name: Pre-fetch platform-tools ${{ env.TOOLS_VERSION }} (Rust >= 1.85)
        run: |
          set -euo pipefail
          dest="$HOME/.cache/solana/${TOOLS_VERSION}/platform-tools"
          if [ ! -x "$dest/rust/bin/rustc" ]; then
            mkdir -p "$dest"
            url="https://github.com/anza-xyz/platform-tools/releases/download/${TOOLS_VERSION}/platform-tools-linux-x86_64.tar.bz2"
            echo "Downloading $url"
            curl -sSfL "$url" -o /tmp/pt.tar.bz2
            # tarball contains rust/, llvm/, ... at its root -> extract INTO platform-tools/
            tar -xjf /tmp/pt.tar.bz2 -C "$dest"
          fi
          "$dest/rust/bin/rustc" --version

      - name: Build (uses the pre-fetched v1.52 platform-tools by default)
        run: anchor build

      - name: anchor test
        run: anchor test --skip-build
