  <defs>
    <linearGradient id="surFav" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E80FF" />
      <stop offset="100%" stop-color="#0ECB81" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0B0E11" />
  <path
    d="M21.5 11.5c-1.3-1.3-3.2-2-5.4-2-3.1 0-5.4 1.7-5.4 4.1 0 2.2 1.7 3.2 4.7 3.9 3 .7 4 1.2 4 2.4 0 1.4-1.4 2.2-3.5 2.2-2 0-3.7-.8-5-2.2"
    stroke="url(#surFav)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />
</svg>
